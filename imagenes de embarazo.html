<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>EMBARAZO EN ADOLECENTES</title>

    <style>
        body{
            margin:0;
            background:linear-gradient(135deg, hsl(295, 68%, 36%), hsl(199, 61%, 45%));
            font-family:Arial,sans-serif;
            color:white;
            text-align:center;
        }

        /* TITULO */
        h1{
            font-size:40px;
            margin:30px 0;
            text-shadow:2px 2px 8px #1c9641;
            font-family: 'Arial Rounded MT Bold', 'Comic Sans MS', sans-serif;
        }

        /* GALERIA */
        .galeria{
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:20px;
            padding:20px;
        }

        .galeria img{
            width:250px;
            height:180px;
            object-fit:cover;
            border-radius:15px;
            border:3px solid #11c09a;
            box-shadow:0 0 15px #9b1d94;
        }

        /* 🦚 ESTILO DEL PAVO REAL */
        .pavo-real{
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;            /* Tamaño grande para que se note */
            text-decoration: none;
            width: 250px;               /* Mismo ancho que las fotos */
            height: 180px;              /* Mismo alto que las fotos */
            background: rgba(255, 255, 255, 0.1); /* Fondo sutil */
            border-radius: 15px;
            border: 3px dashed #ff4081; /* Borde rosado bonito */
            box-shadow: 0 0 15px black;
            transition: 0.3s;
        }

        .pavo-real:hover{
            transform:scale(1.1);
        }
    </style>
</head>
<body>

    <!-- TU TÍTULO HERMOSO -->
    <h1>🌸 EMBARAZO EN ADOLESCENTES 🌸</h1>

    <!-- TU GALERÍA DE IMÁGENES -->
    <div class="galeria">
        <img src="imagen1.jpeg" alt="Imagen 1" />
        <img src="imagen2.jpeg" alt="Imagen 2" />
        <img src="imagen3.jpeg" alt="Imagen 3" />
        <img src="imagen4.jpeg" alt="Imagen 4" />
        <img src="imagen5.jpeg" alt="Imagen 5" />
        <img src="imagen6.jpeg" alt="Imagen 6" />
        <img src="imagen7.jpeg" alt="Imagen 7" />
        <img src="imagen8.jpeg" alt="Imagen 8" />
        <img src="imagen9.jpeg" alt="Imagen 9" />
        
        <!-- 🦚 EL PAVO REAL: Puesto al lado izquierdo  -->
        <a href="index.html" class="pavo-real">🦚</a>
    </div>

</body>
</html>
